<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiment 3</title>
    
    <style>
     
     body {
    font-family: Arial, sans-serif;
    background-color: #ebe4e4;
    justify-content: center;
    align-items: center;
    height: 100vh;
}


     .container
      {
    background: rgb(222, 210, 231);
    padding: 50px;
    border-radius: 10px;
    width: 450px;              /* increase width */
    margin: auto;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    text-align: center;
      }
    
        button
        {
            padding: 10px 10px;
            margin: 10px;
            border: none;
            background-color: #a194ea;
            color: rgb(18, 17, 17);
            border-radius: 5px;
            cursor: pointer;

        }

        input
        {
         padding:5px;
         width:80%;
         margin-bottom:30px;

        }
       
        .btnGrp {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
}




        button:hover
        {
            background-color:darkgrey;

        }

        p{
            margin-top:20px;
        }

    </style>
</head>
<body>

<div class = "container">
<h1 id = "heading">Welcome to JavaScript Lab</h1>
<input type = "text" id = "inputText"  placeholder ="Enter new heading text">
<br>

<div class = "btnGrp">
    <button onclick  = "Heading()">Change Heading</button>
    <button onclick  = "Bg()">Change Background</button>
    <button onclick = "FontSize()">Increase Font size</button>
    <button onclick = "toggleParagraph()">Show/hide paragraph </button>
    <button onclick = "resetPage()">Reset </button>

    </div>

<p id = "para">
    This is simple paragraph . JavaScript events can dynamically change content .
</p>

</div>

<script src = "exp3.js"></script>

</body>
</html>
